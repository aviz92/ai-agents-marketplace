# https://taskfile.dev
# Installation on mac: brew install go-task/tap/go-task

version: "3"

dotenv:
  - .env

vars:
  UV_BIN:  # Dynamically detect uv binary location
    sh: |
      if command -v uv >/dev/null 2>&1; then
        command -v uv
      elif [ -x "/root/.local/bin/uv" ]; then
        echo "/root/.local/bin/uv"
      elif [ -x "$HOME/.local/bin/uv" ]; then
        echo "$HOME/.local/bin/uv"
      else
        echo "/root/.local/bin/uv"
      fi

tasks:
  pre-commit:
    desc: Run pre-commit hooks on all files.
    cmds:
      - |
        echo "Running pre-commit hooks on all files..."
        set -a
        set +a
        "{{.UV_BIN}}" run pre-commit run --all-files

  test:
    desc: Run the full test suite.
    cmds:
      - "{{.UV_BIN}} run pytest tests/ -v"

  lint:
    desc: Run ruff and pylint linters.
    cmds:
      - "{{.UV_BIN}} run ruff check src/ tests/"
      - "{{.UV_BIN}} run pylint src/"

  run:
    desc: Launch the interactive generate TUI in the current directory.
    cmds:
      - "{{.UV_BIN}} run agents-marketplace generate"
